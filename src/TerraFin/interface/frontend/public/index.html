<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TerraFin Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      /* Document pages (stock/insights/calendar/watchlist) scroll naturally.
         The terminal page constrains itself via .tf-terminal-shell (100vh,
         internal overflow) so only it stays a fixed single-screen grid. */
      html, body { margin: 0; padding: 0; min-height: 100%; }
      /* Universal guard: no page (terminal or document) may scroll sideways.
         Each page hand-rolls its own root wrapper, so clamp the x-axis here at
         the root once instead of per-wrapper. Kills the "shifted right" bug. */
      html, body { overflow-x: hidden; max-width: 100%; }
      #root { display: block; width: 100%; max-width: 100%; min-height: 100%; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Apply persisted theme before first paint so a full-reload nav never
      // flashes dark when the user chose light.
      try {
        var s = JSON.parse(localStorage.getItem('terrafin.terminal'));
        var t = s && s.state && s.state.theme;
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
  </body>
</html>
